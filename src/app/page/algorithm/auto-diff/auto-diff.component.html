<form (submit)="$event.preventDefault()">
  @for (field of form.fields(); track field.name) {
    <app-form-field [field]="field"></app-form-field>
  }
  <button mat-raised-button [disabled]="form.group().invalid" (click)="train()"><span>Run</span></button>
</form>
<h4 style="text-align: center">error = target - ((w1 * x1) + (w2 * x2) + bias)</h4>
<div style="width: 100%; height: 60vh" #graphCanvas></div>
<div class="stats-container">
  <div><canvas #w1></canvas></div>
  <div><canvas #w2></canvas></div>
  <div><canvas #bias></canvas></div>
  <div><canvas #error></canvas></div>
</div>
